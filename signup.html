<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>signup-page</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="main-page">
      <div class="card-center">
        <div class="brand">
          <div class="logo">
            <img class="logo" src="/items/logo.png" alt="shoe_logo" />
          </div>
          <div>
            <h2>ShoeStock Pro</h2>
            <p>Shoe inventory Management</p>
          </div>
        </div>
        <section class="signup-form">
          <h2>Create Account</h2>

          <form id="signups" class="signup-forms">
            <input type="text" id="username" placeholder="Full Name" required />
            <input type="email" id="email" placeholder="Email" required />
            <input
              type="password"
              id="password"
              placeholder="Password"
              required
            />
            <input
              type="password"
              id="confirm-password"
              placeholder="Confirm password"
              required
            />
            <button type="submit">Sign Up</button>
            <p>Already have an acoount press login.</p>
            <a class="login-link" href="login.html">Login</a>
          </form>
        </section>
      </div>

      <div class="form-image">
        <img
          src="https://images.pexels.com/photos/6438288/pexels-photo-6438288.jpeg"
          alt="Shoe"
        />
      </div>
    </div>
    <script src="signup.js"></script>
  </body>
</html>
